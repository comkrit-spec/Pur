<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH Procurement Cloud</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AH ProCure">
  <meta name="theme-color" content="#2563eb">
  
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135695.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135695.png">

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] }, colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }, success: { 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }, warning: { 100: '#fef3c7', 500: '#f59e0b', 600: '#d97706' }, danger: { 50: '#fef2f2', 100: '#fee2e2', 600: '#dc2626', 700: '#b91c1c' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen overflow-hidden flex relative">

  <div id="loading-overlay" class="fixed inset-0 z-[100] bg-white/70 flex flex-col items-center justify-center hidden transition-opacity">
    <div class="loader mb-4"></div>
    <div class="text-primary-600 font-semibold tracking-wide" id="loading-text">กำลังโหลดข้อมูล...</div>
  </div>

  <div id="login-screen" class="fixed inset-0 z-50 bg-gradient-to-br from-primary-600 to-indigo-900 flex items-center justify-center transition-opacity duration-500">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ti ti-cloud-computing text-3xl"></i></div>
        <h1 class="text-2xl font-bold text-gray-800">Asia Hydro Cloud</h1>
        <p class="text-sm text-gray-500 mt-1">เข้าสู่ระบบจัดซื้อ (E-Procurement)</p>
      </div>
      <form onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div><label class="block text-sm font-medium mb-1">Username</label><input type="text" id="username" class="w-full bg-gray-50 border rounded-lg px-4 py-2.5 outline-none focus:border-primary-500" required></div>
          <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="password" class="w-full bg-gray-50 border rounded-lg px-4 py-2.5 outline-none focus:border-primary-500" required></div>
          <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl py-3 mt-4 transition shadow-md">เข้าสู่ระบบ</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-screen" class="flex w-full h-full hidden opacity-0 transition-opacity duration-500">
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10 shrink-0">
      <div class="h-16 flex items-center px-6 border-b border-gray-100"><i class="ti ti-droplet-filled text-2xl text-primary-600 mr-2"></i><h1 class="font-bold text-sm tracking-wide">AH Procurement</h1></div>
      <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu"></div>
      <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center font-bold" id="user-avatar">U</div><div class="overflow-hidden"><p class="text-sm font-semibold truncate" id="user-name-display"></p><p class="text-[10px] uppercase font-bold text-primary-600 tracking-wider" id="user-role-display"></p></div></div>
        <button onclick="handleLogout()" class="w-full flex justify-center items-center gap-2 text-sm text-danger-600 bg-danger-50 hover:bg-danger-100 py-2 rounded-lg font-medium transition"><i class="ti ti-logout"></i> ออกจากระบบ</button>
      </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen min-w-0 bg-gray-50">
      <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm shrink-0"><h2 class="text-xl font-semibold text-gray-800" id="page-title">Dashboard</h2></header>
      <div class="flex-1 overflow-auto p-8" id="page-content"></div>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-3 toast-enter z-[200] pointer-events-none transition-all duration-300"><i id="toast-icon" class="text-lg"></i><span id="toast-msg"></span></div>

  <div id="custom-modal" class="fixed inset-0 z-[150] flex items-center justify-center hidden pointer-events-none">
    <div id="modal-backdrop" class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 modal-backdrop-enter pointer-events-auto" onclick="closeModal()"></div>
    <div id="modal-content" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4 relative z-10 transition-all duration-300 modal-content-enter pointer-events-auto">
      <div class="text-center mb-6">
        <div id="modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"></div>
        <h3 class="text-xl font-bold text-gray-800" id="modal-title">ยืนยันการทำรายการ?</h3>
        <p class="text-sm text-gray-500 mt-2" id="modal-desc"></p>
      </div>
      <div class="flex gap-3 w-full">
        <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 font-medium py-2.5 rounded-xl hover:bg-gray-200 transition">ยกเลิก</button>
        <button id="modal-confirm-btn" class="flex-1 text-white font-medium py-2.5 rounded-xl shadow-md transition">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
