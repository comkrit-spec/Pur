<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH Procurement Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] }, colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }, success: { 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }, warning: { 100: '#fef3c7', 600: '#d97706' }, danger: { 100: '#fee2e2', 600: '#dc2626' } } } } }
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .toast-enter { transform: translateY(100%); opacity: 0; }
    .toast-active { transform: translateY(0); opacity: 1; }
    #loading-overlay { backdrop-filter: blur(4px); }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    /* ซ่อนลูกศรใน input number */
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen overflow-hidden flex relative">

  <div id="loading-overlay" class="fixed inset-0 z-[100] bg-white/70 flex flex-col items-center justify-center hidden transition-opacity">
    <div class="loader mb-4"></div>
    <div class="text-primary-600 font-semibold tracking-wide" id="loading-text">กำลังโหลดข้อมูล...</div>
  </div>

  <div id="login-screen" class="fixed inset-0 z-50 bg-gradient-to-br from-primary-600 to-indigo-900 flex items-center justify-center transition-opacity duration-500">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ti ti-cloud-computing text-3xl"></i></div>
        <h1 class="text-2xl font-bold text-gray-800">Asia Hydro Cloud</h1>
        <p class="text-sm text-gray-500 mt-1">เข้าสู่ระบบจัดซื้อ (E-Procurement)</p>
      </div>
      <form onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div><label class="block text-sm font-medium mb-1">Username</label><input type="text" id="username" class="w-full bg-gray-50 border rounded-lg px-4 py-2.5 outline-none focus:border-primary-500" required></div>
          <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="password" class="w-full bg-gray-50 border rounded-lg px-4 py-2.5 outline-none focus:border-primary-500" required></div>
          <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl py-3 mt-4 transition shadow-md">เข้าสู่ระบบ</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-screen" class="flex w-full h-full hidden opacity-0 transition-opacity duration-500">
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10 shrink-0">
      <div class="h-16 flex items-center px-6 border-b border-gray-100"><i class="ti ti-droplet-filled text-2xl text-primary-600 mr-2"></i><h1 class="font-bold text-sm tracking-wide">AH Procurement</h1></div>
      <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu"></div>
      <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center font-bold" id="user-avatar">U</div><div class="overflow-hidden"><p class="text-sm font-semibold truncate" id="user-name-display"></p><p class="text-[10px] uppercase font-bold text-primary-600 tracking-wider" id="user-role-display"></p></div></div>
        <button onclick="handleLogout()" class="w-full flex justify-center items-center gap-2 text-sm text-danger-600 bg-danger-50 hover:bg-danger-100 py-2 rounded-lg font-medium transition"><i class="ti ti-logout"></i> ออกจากระบบ</button>
      </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen min-w-0 bg-gray-50">
      <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm shrink-0"><h2 class="text-xl font-semibold text-gray-800" id="page-title">Dashboard</h2></header>
      <div class="flex-1 overflow-auto p-8" id="page-content"></div>
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-3 toast-enter z-[200] pointer-events-none transition-all duration-300"><i id="toast-icon" class="text-lg"></i><span id="toast-msg"></span></div>

<script>
// =======================================================
// 🔑 1. CONFIGURATION (ต้องเปลี่ยน 2 ค่านี้ให้ตรงกับของคุณ)
// =======================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwqTmz3p7YI6TABBUDKsShygjd972JYdJhQoKK_S-6_VDn58VO1xfu7GbVfTxxseqC9jA/exec"; 
const API_KEY = "AH_ProCure_SecureKey_2026"; 
// =======================================================

const N = n => Number(n).toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:2});
let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
let prDB = []; let usersDB = [];

// API Handler
async function callAPI(payload, loadingMsg = "กำลังโหลด...") {
  showLoading(loadingMsg);
  payload.apiKey = API_KEY; 
  try {
    const response = await fetch(API_URL, {
      method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload)
    });
    const result = await response.json();
    hideLoading();
    return result;
  } catch (error) {
    hideLoading();
    toast("เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว", "error", "ti-wifi-off");
    return { status: "error" };
  }
}

// ==========================================
// 2. AUTH & ROUTING
// ==========================================
const menuConfig = [
  { id: 'dashboard', label: 'Dashboard', icon: 'ti-layout-dashboard', roles: ['admin', 'approver', 'user'] },
  { id: 'create-pr', label: 'สร้าง PR', icon: 'ti-file-plus', roles: ['admin', 'user'] },
  { id: 'approve', label: 'อนุมัติ PR', icon: 'ti-clipboard-check', roles: ['admin', 'approver'] },
  { id: 'po', label: 'สร้าง PO', icon: 'ti-file-invoice', roles: ['admin', 'approver'] },
  { id: 'tracking', label: 'ติดตามสถานะ', icon: 'ti-truck-delivery', roles: ['admin', 'approver', 'user'] },
  { id: 'receive', label: 'รับสินค้า', icon: 'ti-package', roles: ['admin', 'user'] },
  { id: 'export', label: 'Export รายงาน', icon: 'ti-download', roles: ['admin', 'approver'] },
  { id: 'vendors', label: 'Vendor Master', icon: 'ti-building-store', roles: ['admin'] },
  { id: 'budget', label: 'Budget Control', icon: 'ti-chart-pie', roles: ['admin', 'approver'] },
  { id: 'catalog', label: 'คลังสินค้า', icon: 'ti-search', roles: ['admin', 'user'] },
  { id: 'settings', label: 'ตั้งค่าระบบ', icon: 'ti-settings', roles: ['admin'] },
];

async function checkAuth() {
  if (currentUser) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    setTimeout(() => document.getElementById('app-screen').classList.remove('opacity-0'), 50);
    
    document.getElementById('user-name-display').textContent = currentUser.name;
    document.getElementById('user-avatar').textContent = currentUser.name.charAt(0);
    document.getElementById('user-role-display').textContent = currentUser.role;

    renderSidebar();
    
    const res = await callAPI({ action: 'getData' }, "ซิงค์ข้อมูลล่าสุด...");
    if (res.status === 'success') { prDB = res.prs || []; usersDB = res.users || []; go('dashboard'); }
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  
  const res = await callAPI({ action: 'login', user: u, pass: p }, "ตรวจสอบบัญชี...");
  if (res.status === 'success') {
    localStorage.setItem('currentUser', JSON.stringify(res.user));
    currentUser = res.user;
    toast(`ยินดีต้อนรับ ${currentUser.name}`, 'success');
    checkAuth();
  } else { toast(res.message || "รหัสไม่ถูกต้อง", 'error', 'ti-alert-circle'); }
}

function handleLogout() { localStorage.removeItem('currentUser'); location.reload(); }

function renderSidebar() {
  document.getElementById('sidebar-menu').innerHTML = menuConfig
    .filter(m => m.roles.includes(currentUser.role))
    .map(m => `<button onclick="go('${m.id}')" id="nav-${m.id}" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-primary-600 transition-colors"><i class="ti ${m.icon} text-lg"></i> ${m.label}</button>`)
    .join('');
}

function go(page) {
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('bg-primary-50', 'text-primary-600'));
  document.getElementById('nav-' + page)?.classList.add('bg-primary-50', 'text-primary-600');
  
  const titles = { dashboard:'Dashboard', 'create-pr':'สร้างใบขอซื้อ (PR)', approve:'อนุมัติรายการ', po:'สร้างใบสั่งซื้อ (PO)', tracking:'ติดตามสถานะ', receive:'รับสินค้า (GR)', export:'Export รายงาน', vendors:'Vendor Master', budget:'ควบคุมงบประมาณ', catalog:'คลังสินค้า', settings:'ตั้งค่าระบบ (Cloud)' };
  document.getElementById('page-title').textContent = titles[page] || page;
  
  const c = document.getElementById('page-content');
  if(page==='dashboard') c.innerHTML = pageDashboard();
  else if(page==='create-pr') { c.innerHTML = pageCreatePR(); initPRForm(); }
  else if(page==='approve') c.innerHTML = pageApprove();
  else if(page==='po') c.innerHTML = pagePO();
  else if(page==='tracking') c.innerHTML = pageTracking();
  else if(page==='receive') c.innerHTML = pageReceive();
  else if(page==='export') c.innerHTML = pageExport();
  else if(page==='vendors') c.innerHTML = pageVendors();
  else if(page==='budget') c.innerHTML = pageBudget();
  else if(page==='catalog') c.innerHTML = pageCatalog();
  else if(page==='settings') c.innerHTML = pageSettings();
}

// ==========================================
// 3. UI UTILITIES
// ==========================================
function toast(msg, type='success', icon='ti-circle-check') {
  const t = document.getElementById('toast');
  const colors = { success: 'bg-gray-800 text-white', error: 'bg-danger-600 text-white', warning: 'bg-warning-500 text-white', info: 'bg-primary-600 text-white' };
  t.className = `fixed bottom-6 right-6 px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-3 transition-all duration-300 z-[200] pointer-events-none ${colors[type]}`;
  document.getElementById('toast-icon').className = `ti ${icon} text-lg`;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.remove('toast-enter'); t.classList.add('toast-active');
  setTimeout(() => { t.classList.remove('toast-active'); t.classList.add('toast-enter'); }, 3000);
}

function showLoading(text) { document.getElementById('loading-text').textContent = text; document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

function sb(status) {
  const map = { pending: { l: 'รออนุมัติ', c: 'bg-warning-100 text-warning-600' }, approved: { l: 'อนุมัติแล้ว', c: 'bg-success-100 text-success-700' }, rejected: { l: 'ปฏิเสธ', c: 'bg-danger-100 text-danger-600' }, po_issued: { l: 'ออก PO แล้ว', c: 'bg-primary-100 text-primary-700' }, received: { l: 'รับของแล้ว', c: 'bg-gray-100 text-gray-600' } };
  const s = map[status] || { l: status, c: 'bg-gray-100 text-gray-600' };
  return `<span class="px-2.5 py-1 rounded-full text-[11px] font-medium tracking-wide ${s.c}">${s.l}</span>`;
}

// Mock Data สำหรับหน้าที่ยังไม่ได้ต่อ API 
const vendorDB = [{id:'V01', name:'TPG Center Co., Ltd.', score:4.5, cat:'อะไหล่', spend:342000}, {id:'V02', name:'The Inner Line Co., Ltd.', score:4.2, cat:'เครื่องมือวัด', spend:187000}];
const budgetDB = [{dept:'MT', budget:500000, used:380000}, {dept:'IT', budget:300000, used:210000}];
const catalogDB = [{code:'IT01', name:'Laptop Dell', price:35000, stock:5}, {code:'OF01', name:'กระดาษ A4', price:120, stock:100}];

// ==========================================
// 4. PAGE RENDERS
// ==========================================

function pageDashboard() {
  const pending = prDB.filter(r => r.status === 'pending').length;
  const totalVal = prDB.reduce((sum, r) => sum + Number(r.total), 0);
  return `
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><div class="text-gray-500 text-xs font-semibold uppercase mb-2">PR ทั้งหมด</div><div class="text-3xl font-bold text-gray-800">${prDB.length}</div></div>
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><div class="text-gray-500 text-xs font-semibold uppercase mb-2">รออนุมัติ</div><div class="text-3xl font-bold text-warning-600">${pending}</div></div>
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100"><div class="text-gray-500 text-xs font-semibold uppercase mb-2">มูลค่ารวมสะสม</div><div class="text-3xl font-bold text-success-600">฿${N(totalVal)}</div></div>
  </div>`;
}

// --- ฟังก์ชัน PR (แบบเต็ม) ---
let prItemsList = [];
function initPRForm() { prItemsList = [{ name: '', unit: 'ชิ้น', qty: 1, price: 0 }]; renderPRTable(); }

function renderPRTable() {
  const container = document.getElementById('pr-items-container');
  if(!container) return;
  container.innerHTML = prItemsList.map((it, i) => `
    <div class="grid grid-cols-12 gap-3 items-center mb-3">
      <div class="col-span-1 text-center text-xs font-medium text-gray-400">${i + 1}</div>
      <div class="col-span-5"><input type="text" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500" placeholder="ชื่อสินค้า/บริการ" value="${it.name}" oninput="prItemsList[${i}].name=this.value"></div>
      <div class="col-span-2"><input type="text" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500 text-center" placeholder="หน่วย" value="${it.unit}" oninput="prItemsList[${i}].unit=this.value"></div>
      <div class="col-span-2"><input type="number" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500 text-center" min="1" value="${it.qty}" oninput="prItemsList[${i}].qty=+this.value; calculatePRTotal()"></div>
      <div class="col-span-2 flex items-center gap-2">
        <input type="number" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500 text-right" min="0" value="${it.price}" oninput="prItemsList[${i}].price=+this.value; calculatePRTotal()">
        <button onclick="removePRItem(${i})" class="text-gray-400 hover:text-danger-600 transition p-1.5 rounded-md hover:bg-danger-50"><i class="ti ti-trash text-lg"></i></button>
      </div>
    </div>
  `).join('');
  calculatePRTotal();
}
function addPRItem() { prItemsList.push({ name: '', unit: 'ชิ้น', qty: 1, price: 0 }); renderPRTable(); }
function removePRItem(i) { if(prItemsList.length > 1) { prItemsList.splice(i, 1); renderPRTable(); } }
function calculatePRTotal() {
  const subtotal = prItemsList.reduce((sum, it) => sum + (it.qty * it.price), 0);
  const vat = subtotal * 0.07;
  const grandTotal = subtotal + vat;
  const totalBox = document.getElementById('pr-total-box');
  if(totalBox) {
    totalBox.innerHTML = `<div class="flex justify-between text-sm text-gray-500 mb-2"><span>ยอดก่อน VAT:</span> <span>฿ ${N(subtotal)}</span></div><div class="flex justify-between text-sm text-gray-500 mb-3 pb-3 border-b border-gray-200"><span>VAT 7%:</span> <span>฿ ${N(vat)}</span></div><div class="flex justify-between text-lg font-bold text-primary-700"><span>ยอดสุทธิรวม:</span> <span id="pr-grand-total" data-val="${grandTotal}">฿ ${N(grandTotal)}</span></div>`;
  }
}

function pageCreatePR() {
  return `
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <div class="xl:col-span-2 space-y-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"><h3 class="font-semibold text-gray-800 mb-4 pb-3 border-b border-gray-100 flex items-center gap-2"><i class="ti ti-file-info text-primary-600"></i> ข้อมูลทั่วไป</h3><div class="grid grid-cols-2 gap-5"><div><label class="block mb-1.5 text-sm font-medium text-gray-700">ผู้ขอซื้อ</label><input type="text" class="w-full bg-gray-100 border border-gray-200 text-gray-500 text-sm rounded-lg px-3 py-2 cursor-not-allowed" value="${currentUser.name}" readonly></div><div><label class="block mb-1.5 text-sm font-medium text-gray-700">แผนก (Cost Center)</label><select id="pr-dept" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500"><option>MT</option><option>IT</option><option>HR</option><option>Operation</option></select></div></div></div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"><div class="flex justify-between items-end mb-4 pb-3 border-b border-gray-100"><h3 class="font-semibold text-gray-800 flex items-center gap-2"><i class="ti ti-list-details text-primary-600"></i> รายการสินค้า</h3><button onclick="addPRItem()" class="text-sm font-medium text-primary-600 hover:text-primary-700 flex items-center gap-1 bg-primary-50 px-3 py-1.5 rounded-lg transition"><i class="ti ti-plus"></i> เพิ่มรายการ</button></div><div class="grid grid-cols-12 gap-3 mb-2 px-1"><div class="col-span-1 text-center text-xs font-semibold text-gray-400 uppercase">#</div><div class="col-span-5 text-xs font-semibold text-gray-400 uppercase">ชื่อสินค้า / บริการ</div><div class="col-span-2 text-center text-xs font-semibold text-gray-400 uppercase">หน่วย</div><div class="col-span-2 text-center text-xs font-semibold text-gray-400 uppercase">จำนวน</div><div class="col-span-2 text-right text-xs font-semibold text-gray-400 uppercase pr-8">ราคา/หน่วย</div></div><div id="pr-items-container" class="space-y-1"></div></div>
    </div>
    <div class="xl:col-span-1 space-y-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-6"><h3 class="font-semibold text-gray-800 mb-4">สรุปยอดรวม</h3><div id="pr-total-box" class="bg-gray-50 rounded-xl p-5 mb-5 border border-gray-100"></div><div class="mb-5"><label class="block mb-2 text-sm font-medium text-gray-700">หมายเหตุ</label><textarea class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:border-primary-500 h-24 resize-none" placeholder="ระบุโปรเจกต์..."></textarea></div><button onclick="submitNewPR()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl text-sm px-5 py-3 text-center transition shadow-md shadow-primary-200 flex justify-center items-center gap-2"><i class="ti ti-cloud-upload text-lg"></i> ส่งขออนุมัติ PR</button></div>
    </div>
  </div>`;
}

async function submitNewPR() {
  const dept = document.getElementById('pr-dept').value;
  const grandTotal = document.getElementById('pr-grand-total')?.getAttribute('data-val') || 0;
  if(prItemsList.some(it => !it.name.trim())) return toast('กรุณากรอกชื่อสินค้าให้ครบถ้วน', 'error', 'ti-alert-circle');
  if(Number(grandTotal) <= 0) return toast('ยอดรวมต้องมากกว่า 0 บาท', 'error', 'ti-alert-circle');
  
  const newId = `PR${new Date().getFullYear().toString().slice(-2)}${String(prDB.length+1).padStart(4,'0')}`;
  const newPR = { id: newId, date: new Date().toLocaleDateString('th-TH'), dept: dept, req: currentUser.name, items: prItemsList, status: 'pending', total: grandTotal };
  const res = await callAPI({ action: 'createPR', prData: newPR }, "กำลังบันทึก...");
  if (res.status === 'success') { prDB.push(newPR); toast('สร้าง PR เรียบร้อย', 'success'); go('tracking'); }
  else { toast(res.message, 'error'); }
}

function pageApprove() {
  const pending = prDB.filter(r => r.status === 'pending');
  if(pending.length === 0) return `<div class="bg-white rounded-2xl p-12 text-center text-gray-400 border border-dashed"><i class="ti ti-checkbox text-5xl mb-3 text-success-400"></i><p>ไม่มีเอกสารรออนุมัติ</p></div>`;
  return `<div class="grid gap-4">` + pending.map(r => `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center hover:border-primary-300 transition"><div><div class="flex items-center gap-2"><span class="font-bold text-primary-700">${r.id}</span> ${sb(r.status)}</div><div class="text-sm font-medium text-gray-800 mt-1">${r.items[0].name} ${r.items.length > 1 ? `และอื่นๆ อีก ${r.items.length - 1} รายการ` : ''} <span class="text-primary-600">(ยอดสุทธิ ฿${N(r.total)})</span></div><div class="text-xs text-gray-500 mt-1">วันที่: ${r.date} | แผนก: ${r.dept} | ผู้ขอ: ${r.req}</div></div><div class="flex flex-col gap-2"><button onclick="doApprove('${r.id}', 'approved')" class="bg-success-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm hover:bg-success-700 flex items-center justify-center gap-1"><i class="ti ti-check"></i> อนุมัติ</button><button onclick="doApprove('${r.id}', 'rejected')" class="bg-white border border-danger-200 text-danger-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-danger-50 flex items-center justify-center gap-1"><i class="ti ti-x"></i> ปฏิเสธ</button></div></div>`).join('') + `</div>`;
}

async function doApprove(id, status) {
  const res = await callAPI({ action: 'updatePR', id: id, status: status }, "กำลังอัปเดต...");
  if(res.status === 'success') { const pr = prDB.find(x => x.id === id); if(pr) pr.status = status; toast(`ทำรายการสำเร็จ`, 'success'); go('approve'); }
  else { toast(res.message, 'error'); }
}

function pageTracking() {
  const list = (currentUser.role === 'user') ? prDB.filter(r => r.req === currentUser.name) : prDB;
  return `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"><table class="min-w-full text-left"><thead class="bg-gray-50 border-b border-gray-100"><tr><th class="p-4 text-sm font-semibold text-gray-500">PR No.</th><th class="p-4 text-sm font-semibold text-gray-500">ข้อมูลสินค้า/บริการ</th><th class="p-4 text-right text-sm font-semibold text-gray-500">มูลค่ารวม</th><th class="p-4 text-center text-sm font-semibold text-gray-500">สถานะ</th></tr></thead><tbody class="divide-y divide-gray-50">${list.reverse().map(r=>`<tr class="hover:bg-gray-50 transition"><td class="p-4 font-semibold text-primary-600">${r.id}</td><td class="p-4"><div class="text-sm font-medium text-gray-800">${r.items[0].name}</div><div class="text-xs text-gray-500">${r.date} | ${r.dept} | ${r.req}</div></td><td class="p-4 text-right text-sm font-medium">฿${N(r.total)}</td><td class="p-4 text-center">${sb(r.status)}</td></tr>`).join('')}</tbody></table></div>`;
}

// --- ฟังก์ชันอื่นๆ ---

function pagePO() { 
  const approvedPRs = prDB.filter(r => r.status === 'approved');
  return `<div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100"><h3 class="font-semibold text-gray-800 mb-4 pb-3 border-b border-gray-100"><i class="ti ti-file-invoice text-primary-600"></i> สร้างใบสั่งซื้อ (Purchase Order)</h3>${approvedPRs.length === 0 ? `<div class="text-center text-gray-400 py-8"><p>ไม่มี PR ที่อนุมัติพร้อมออก PO</p></div>` : `<p class="text-sm text-gray-500 mb-4">เลือก PR ที่อนุมัติแล้วเพื่อนำไปออก PO</p><div class="space-y-3 mb-6">${approvedPRs.map(r => `<div class="flex items-center gap-3 p-3 border border-gray-100 rounded-lg bg-gray-50"><input type="checkbox" class="w-4 h-4 text-primary-600"><label class="text-sm font-medium text-gray-700 flex-1">${r.id} - ${r.items[0].name} (฿${N(r.total)})</label></div>`).join('')}</div><button onclick="toast('ฟังก์ชันออก PO รอการเชื่อมต่อ', 'success')" class="bg-primary-600 text-white px-6 py-2 rounded-lg text-sm font-medium shadow-md">สร้างเอกสาร PO</button>`}</div>`; 
}

function pageReceive() { 
  return `<div class="bg-white rounded-2xl shadow-sm p-12 text-center text-gray-500 border border-gray-100"><i class="ti ti-package text-5xl mb-4 text-success-300"></i><h2 class="text-lg font-medium text-gray-800">ระบบบันทึกการรับสินค้า (GR)</h2><p class="mt-2 text-sm">ส่วนนี้รอเชื่อมต่อกับคลังสินค้าใน Phase ถัดไป</p></div>`; 
}

function pageExport() { 
  return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:border-primary-500 cursor-pointer transition flex flex-col items-center text-center group" onclick="toast('กำลังดาวน์โหลด Excel...','info')"><div class="w-14 h-14 bg-success-50 text-success-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition"><i class="ti ti-file-spreadsheet text-2xl"></i></div><h3 class="font-bold text-gray-800 text-sm">PR/PO Summary (.xlsx)</h3><p class="text-xs text-gray-500 mt-2">รายงานสรุปข้อมูลการสั่งซื้อ</p></div><div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:border-primary-500 cursor-pointer transition flex flex-col items-center text-center group" onclick="toast('สร้างไฟล์ PDF สำเร็จ','success')"><div class="w-14 h-14 bg-danger-50 text-danger-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition"><i class="ti ti-file-type-pdf text-2xl"></i></div><h3 class="font-bold text-gray-800 text-sm">Budget Report (.pdf)</h3><p class="text-xs text-gray-500 mt-2">รายงานสรุปการใช้งบประมาณ</p></div></div>`; 
}

function pageVendors() { 
  return `<div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100"><h2 class="text-lg font-bold mb-4">รายชื่อผู้ขาย (Vendor Master)</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-5">${vendorDB.map(v=>`<div class="border border-gray-100 p-4 rounded-xl"><div class="flex justify-between items-start"><div class="w-10 h-10 bg-primary-100 text-primary-700 rounded-lg flex items-center justify-center font-bold text-lg mb-3">${v.name[0]}</div><span class="bg-warning-100 text-warning-700 text-xs px-2 py-0.5 rounded-md font-bold">⭐ ${v.score}</span></div><h3 class="font-bold text-gray-800 text-sm truncate">${v.name}</h3><p class="text-xs text-gray-500 mt-1">หมวดหมู่: ${v.cat}</p><div class="mt-4 pt-3 border-t border-gray-50 flex justify-between text-xs"><span class="text-gray-500">ยอดซื้อสะสม:</span><span class="font-semibold text-gray-800">฿ ${N(v.spend)}</span></div></div>`).join('')}</div></div>`; 
}

function pageBudget() { 
  return `<div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100"><h2 class="text-lg font-bold mb-4">งบประมาณ (Budget Control)</h2><div class="space-y-4">${budgetDB.map(b=>{ const pct = Math.round((b.used/b.budget)*100); const col = pct > 80 ? 'bg-danger-500' : 'bg-success-500'; return `<div><div class="flex justify-between text-sm mb-1.5"><span class="font-medium text-gray-700">แผนก ${b.dept}</span><span class="text-gray-500 text-xs">ใช้ไป ฿${N(b.used)} / ฿${N(b.budget)}</span></div><div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden"><div class="${col} h-2.5 rounded-full" style="width: ${pct}%"></div></div></div>`}).join('')}</div></div>`; 
}

function pageCatalog() { 
  return `<div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100"><h2 class="text-lg font-bold mb-4">คลังสินค้า (Catalog Master)</h2><div class="overflow-x-auto"><table class="min-w-full text-left text-sm"><thead class="bg-gray-50"><th class="p-3 text-gray-500">รหัส</th><th class="p-3 text-gray-500">ชื่อสินค้า</th><th class="p-3 text-gray-500">ราคา(฿)</th><th class="p-3 text-gray-500">Stock</th></thead><tbody>${catalogDB.map(c=>`<tr class="border-b border-gray-50"><td class="p-3 font-medium text-primary-600">${c.code}</td><td class="p-3 text-gray-800">${c.name}</td><td class="p-3">${N(c.price)}</td><td class="p-3"><span class="px-2 py-1 rounded-md text-xs ${c.stock > 10 ? 'bg-success-100 text-success-700' : 'bg-warning-100 text-warning-700'}">${c.stock} ชิ้น</span></td></tr>`).join('')}</tbody></table></div></div>`; 
}

function pageSettings() {
  return `
  <div class="max-w-5xl space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ti ti-settings text-primary-600"></i> การตั้งค่าระบบ</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">LINE Notify Token</label><div class="flex gap-2"><input type="password" value="****************" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none" disabled><button onclick="toast('ต้องแก้ไขที่ Google Apps Script', 'info')" class="bg-primary-50 text-primary-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary-100 transition">แก้ไข</button></div></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">สถานะ Database</label><div class="flex items-center gap-3 p-3 bg-success-50 border border-success-100 rounded-lg"><div class="w-3 h-3 bg-success-500 rounded-full animate-pulse"></div><span class="text-sm font-medium text-success-700">เชื่อมต่อ API ปกติ</span></div></div>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div onclick="generateMockData()" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:border-primary-300 transition cursor-pointer group"><div class="w-12 h-12 bg-primary-50 text-primary-600 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition"><i class="ti ti-database text-2xl"></i></div><h4 class="font-bold text-gray-800">สร้าง Mock Data</h4><p class="text-xs text-gray-500 mt-2">รีเซ็ตและสร้างข้อมูลจำลองใน Google Sheets</p></div>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ti ti-users text-primary-600"></i> จัดการผู้ใช้งาน</h3><div class="overflow-hidden border border-gray-100 rounded-lg"><table class="min-w-full text-sm text-left"><thead class="bg-gray-50"><th class="p-3 text-gray-500">ชื่อ-นามสกุล</th><th class="p-3 text-gray-500">Username</th><th class="p-3 text-gray-500">สิทธิ์ (Role)</th></thead><tbody class="divide-y divide-gray-50">${usersDB.map(u => `<tr><td class="p-3 font-medium text-gray-800">${u.name}</td><td class="p-3 text-gray-500">${u.username}</td><td class="p-3"><span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded text-xs uppercase">${u.role}</span></td></tr>`).join('')}</tbody></table></div></div>
  </div>`;
}

async function generateMockData() {
  if(!confirm("การทำขั้นตอนนี้จะรีเซ็ตข้อมูลใน Google Sheets ทั้งหมด แน่ใจหรือไม่?")) return;
  const res = await callAPI({ action: 'initMockData' }, "สร้างข้อมูลจำลอง...");
  if (res.status === 'success') { toast(res.message, 'success'); setTimeout(() => location.reload(), 1500); }
  else { toast(res.message, 'error'); }
}
